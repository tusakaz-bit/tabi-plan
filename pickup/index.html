<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>過去のピックアップ宿一覧 | Tabi Plan</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2.5rem;
            margin-top: 4rem;
        }

        .archive-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
        }

        .archive-card:hover {
            transform: translateY(-10px);
            border-color: #D4AF37;
        }

        .archive-image {
            height: 200px;
            background-size: cover;
            background-position: center;
        }

        .archive-content {
            padding: 1.5rem;
        }

        .archive-date {
            font-size: 0.8rem;
            color: #D4AF37;
            margin-bottom: 0.5rem;
            display: block;
        }

        .archive-title {
            font-size: 1.25rem;
            font-weight: 800;
            line-height: 1.4;
        }
    </style>
</head>
<body style="background-color: #0F0F12;">
    <nav style="padding: 1rem 5%; background: rgba(15,15,18,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;">
        <h1 class="logo" style="cursor: pointer;" onclick="window.location.href='../'">TABI <span>PLAN</span></h1>
    </nav>

    <main class="container" style="padding: 6rem 2rem;">
        <div class="section-header">
            <span class="badge" style="background: #D4AF37; color: black; padding: 0.2rem 0.8rem; border-radius: 2px; font-weight: 800; font-size: 0.7rem; margin-bottom: 0.5rem; display: inline-block;">Archive</span>
            <h2 class="section-title" style="font-size: 3rem; font-weight: 900; margin-bottom: 1rem;">過去のピックアップ宿</h2>
            <p class="section-subtitle">これまでご紹介した「賢く、美しく」な名宿たちの記録</p>
        </div>

        <div class="archive-grid">
            <!-- Zentis Osaka -->
            <a href="2026-04-24-zentis-osaka.html" class="archive-card">
                <div class="archive-image" style="background-image: url('https://img.travel.rakuten.co.jp/share/HOTEL/180526/180526.jpg?v=3')"></div>
                <div class="archive-content">
                    <span class="archive-date">2026.04.24 掲載</span>
                    <h3 class="archive-title">Zentis Osaka</h3>
                    <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 1rem;">まるで「モデルルームに泊まる雰囲気」。パレスホテル系列の洗練されたデザインホテル。</p>
                </div>
            </a>

            <!-- Hisoca -->
            <a href="2026-04-22-hotel-hisoca.html" class="archive-card">
                <div class="archive-image" style="background-image: url('https://img.travel.rakuten.co.jp/share/HOTEL/183423/183423.jpg?v=2')"></div>
                <div class="archive-content">
                    <span class="archive-date">2026.04.22 掲載</span>
                    <h3 class="archive-title">HOTEL HISOCA IKEBUKURO</h3>
                    <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 1rem;">全室サウナ付き。都会の喧騒を忘れる洗練された隠れ家。</p>
                </div>
            </a>

            <!-- 今後、ここに新しい宿が追加されていきます -->
        </div>
    </main>

    <footer style="text-align: center; padding: 4rem; color: rgba(255,255,255,0.1); font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05);">
        &copy; 2026 Tabi Plan. Smart & Beautiful Travels.
    </footer>
</body>
</html>
