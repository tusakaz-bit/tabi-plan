name: Daily X Post Draft Generator

on:
  schedule:
    # 毎日 日本時間 午前8時 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate Draft
        run: node scripts/post_to_x.js
