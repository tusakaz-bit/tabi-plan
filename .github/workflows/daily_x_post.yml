name: Daily X Post Draft Generator

on:
  schedule:
    # 毎日 日本時間 午前8時 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Generate Daily Pickup and Commit
        run: |
          cd scripts
          node generate_daily_pickup.js
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ../pickup/*.html ../index.html
          git commit -m "Auto-generate daily pickup article" || echo "No changes to commit"
          git push
          
      - name: Generate Draft and Post to Hatena
        run: |
          cd scripts
          node post_to_x.js
          node post_to_hatena.js
        env:
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
