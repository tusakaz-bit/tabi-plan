name: Daily X Post Draft Generator

on:
  schedule:
    # 毎日 日本時間 午前8時 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行ボタンを有効化

permissions:
  contents: write

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Generate Daily Pickup, City Pages and Commit
        run: |
          cd scripts
          node generate_city_pages.js
          node generate_daily_pickup.js
          node generate_niche_pages.js
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ../pickup/*.html ../index.html ../sitemap.xml ../tokyo/index.html ../osaka/index.html ../kyoto/index.html ../sapporo/index.html ../okinawa/index.html ../fukuoka/index.html
          git add ../fukuoka/hakata-daiyokujo/index.html ../fukuoka/tenjin-sudomari/index.html ../osaka/shinosaka-cospa/index.html ../osaka/namba-couple/index.html
          git add ../tokyo/eki-kirei-yasui/index.html ../tokyo/shinjuku-joshitabi/index.html ../kyoto/eki-daiyokujo/index.html ../kyoto/kawaramachi-couple/index.html
          git add ../sapporo/eki-breakfast/index.html ../sapporo/susukino-sudomari/index.html ../okinawa/naha-kokusaidori/index.html ../okinawa/naha-airport-sogei/index.html
          git commit -m "Auto-generate daily pickup, niche, and city pages" || echo "No changes to commit"
          git push
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Generate Draft and Post to Hatena
        run: |
          cd scripts
          node post_to_x.js
          node post_to_hatena.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
