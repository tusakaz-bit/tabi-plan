<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://tabi-plan.org/contact.html">
    <title>お問い合わせ | TABI PLAN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-content {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            padding: 3rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--glass-shadow);
            margin: 6rem auto 4rem;
            max-width: 600px;
            color: var(--text-primary);
        }

        .contact-content h2 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
            color: var(--accent-color);
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 150px;
        }

        .submit-button {
            display: block;
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
            margin-top: 2rem;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }

        @media (max-width: 768px) {
            .contact-content {
                padding: 1.5rem;
                margin: 5rem 1rem 2rem;
            }
        }
    </style>
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">
    <div class="background-animation" style="background: url('bg_portal_dawn_1775650889753.png') center/cover no-repeat;">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <header class="header">
        <div class="container">
            <h1 class="logo" style="cursor: pointer;" onclick="window.location.href='/'">TABI <span>PLAN</span></h1>
            <nav class="nav">
                <a href="/">Home</a>
            </nav>
        </div>
    </header>

    <main style="flex: 1;">
        <div class="container">
            <div class="contact-content">
                <h2>お問い合わせ</h2>
                <form id="contact-form" action="https://formspree.io/f/mvzvyvwq" method="POST">
                    <div class="form-group">
                        <label for="name" class="form-label">お名前</label>
                        <input type="text" id="name" name="name" class="form-control" required placeholder="例: 山田 太郎">
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">メールアドレス</label>
                        <input type="email" id="email" name="email" class="form-control" required placeholder="例: yamada@example.com">
                    </div>
                    <div class="form-group">
                        <label for="subject" class="form-label">件名</label>
                        <input type="text" id="subject" name="subject" class="form-control" required placeholder="お問い合わせの件名">
                    </div>
                    <div class="form-group">
                        <label for="message" class="form-label">お問い合わせ内容</label>
                        <textarea id="message" name="message" class="form-control" required placeholder="お問い合わせ内容をご記入ください"></textarea>
                    </div>
                    <button type="submit" class="submit-button"><i class="fa-solid fa-paper-plane"></i> 送信する</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-left">
                <h2 style="cursor: pointer;" onclick="window.location.href='/'">TABI <span>PLAN</span></h2>
                <p>次の旅を、最高の夜明けから。</p>
            </div>
            <div class="footer-right">
                <p>&copy; 2026 Tabi Plan. All Rights Reserved.</p>
                <div style="margin-top: 10px;">
                    <a href="privacy.html" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#94a3b8'">プライバシーポリシー</a>
                    <span style="color: #94a3b8; margin: 0 5px;">|</span>
                    <a href="contact.html" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#94a3b8'">お問い合わせ</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        var form = document.getElementById("contact-form");
        
        async function handleSubmit(event) {
            event.preventDefault();
            var data = new FormData(event.target);
            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    alert("お問い合わせを受け付けました。ホームに戻ります。");
                    window.location.href = "https://tabi-plan.org/";
                } else {
                    alert("送信に失敗しました。時間をおいて再度お試しください。");
                }
            }).catch(error => {
                alert("通信エラーが発生しました。");
            });
        }
        
        form.addEventListener("submit", handleSubmit);
    </script>
</body>
</html>
